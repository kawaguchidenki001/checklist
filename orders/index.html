<!DOCTYPE html>
<html lang="ja">
<link rel="manifest" href="/checklist/manifest.json">
<meta name="theme-color" content="#5e35b1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お仕事">
<link rel="apple-touch-icon" href="/checklist/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/checklist/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/checklist/icons/icon-512.png">
<script src="/checklist/register-sw.js" defer></script><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受注リスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --paper: #fefdf9;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-fade: #888;
    --accent: #1d4e7d;
    --line: #d9d4c6;
    --warn: #d97706;
    --danger: #b8302d;
    --safe: #4a7c59;
    --done: #a8a496;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 20px 80px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(29, 78, 125, 0.03), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(74, 124, 89, 0.03), transparent 40%);
  }
  .container { max-width: 980px; margin: 0 auto; }
  header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  header::after {
    content: "";
    position: absolute;
    bottom: -6px; left: 0;
    width: 60px; height: 2px;
    background: var(--accent);
  }
  .title-row {
    display: flex; align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .header-meta {
    display: flex; align-items: center; gap: 12px;
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--ink-fade);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  #sync-status {
    font-size: 11px; color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
  }
  #btn-reload {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); padding: 4px 10px;
    font-size: 11px; cursor: pointer; border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #btn-reload:hover { border-color: var(--ink); color: var(--ink); }
  .stats {
    display: flex; gap: 24px; margin-top: 16px;
    font-size: 13px; color: var(--ink-soft); flex-wrap: wrap;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: var(--ink); font-size: 15px;
  }
  .controls {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px; background: transparent;
    border: 1px solid var(--line); color: var(--ink-soft);
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s; border-radius: 2px;
  }
  .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn-add-main {
    padding: 14px 24px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    border-radius: 3px; transition: background 0.2s;
    margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
  }
  .btn-add-main:hover { background: var(--accent); }
  .btn-add-main::before {
    content: "+"; display: inline-block;
    width: 20px; height: 20px;
    background: var(--paper); color: var(--ink);
    text-align: center; line-height: 20px;
    border-radius: 50%; font-weight: 700;
  }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item {
    background: var(--paper); border: 1px solid var(--line);
    border-left: 4px solid var(--line); border-radius: 3px;
    padding: 16px 18px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .item.s-見積中 { border-left-color: #888; }
  .item.s-受注 { border-left-color: #1d4e7d; }
  .item.s-着工 { border-left-color: var(--warn); }
  .item.s-完工 { border-left-color: var(--safe); }
  .item.s-請求済 { border-left-color: #7d4e9b; }
  .item.s-入金済 {
    border-left-color: var(--done); opacity: 0.6;
  }
  .item-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 8px;
  }
  .item-main {
    flex: 1; min-width: 0;
  }
  .item-client {
    font-size: 17px; font-weight: 700; color: var(--ink);
    word-break: break-word;
    font-family: 'Noto Serif JP', serif;
  }
  .item-work {
    font-size: 14px; color: var(--ink-soft);
    margin-top: 2px; word-break: break-word;
  }
  .status-tag {
    font-size: 12px; padding: 4px 12px;
    border-radius: 12px; font-weight: 500;
    white-space: nowrap; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink-soft);
  }
  .status-tag.s-見積中 { background: #ebe8e0; color: #5a4a3a; border-color: #d8d2c2; }
  .status-tag.s-受注 { background: #e4eef5; color: #1d4e7d; border-color: #c8dce8; }
  .status-tag.s-着工 { background: #fde8d8; color: #8a4a1a; border-color: #f5d4b8; }
  .status-tag.s-完工 { background: #e8f0e6; color: #2d5a3d; border-color: #c8dcc4; }
  .status-tag.s-請求済 { background: #efe8f5; color: #4a3a8a; border-color: #ddd2ea; }
  .status-tag.s-入金済 { background: #ebe8e0; color: #5a4a3a; border-color: #d8d2c2; }
  .item-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 4px 16px;
    margin-top: 8px;
    font-size: 12px;
  }
  .detail-row {
    display: flex; gap: 6px; align-items: baseline;
  }
  .detail-label {
    color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    min-width: 56px;
  }
  .detail-value {
    color: var(--ink-soft); word-break: break-word;
  }
  .detail-value.date {
    font-family: 'JetBrains Mono', monospace;
  }
  .detail-value.urgent { color: var(--danger); font-weight: 700; }
  .detail-value.soon { color: var(--warn); font-weight: 700; }
  .item-note {
    font-size: 13px; color: var(--ink-soft);
    margin-top: 10px; padding: 8px 12px;
    background: var(--bg); border-left: 2px solid var(--line);
    border-radius: 2px; white-space: pre-wrap;
    word-break: break-word; line-height: 1.5;
  }
  .item-footer {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 10px;
    padding-top: 8px; border-top: 1px dashed var(--line);
  }
  .item-id {
    font-size: 10px; color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
  }
  .item-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); cursor: pointer;
    padding: 4px 10px; font-size: 12px;
    border-radius: 2px; transition: all 0.2s; line-height: 1;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-edit:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-status:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--ink-fade); font-family: 'Noto Serif JP', serif;
    font-style: italic;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
  .backup-bar {
    display: flex; gap: 8px; margin-top: 24px;
    justify-content: flex-end; flex-wrap: wrap;
  }
  .backup-btn {
    padding: 6px 14px; background: transparent;
    border: 1px solid var(--line); color: var(--ink-soft);
    font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.2s; border-radius: 2px;
  }
  .backup-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26, 26, 26, 0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper); border-radius: 6px;
    padding: 28px; max-width: 560px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: slideUp 0.2s;
  }
  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 24px; padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .modal-title::after {
    content: ""; position: absolute;
    bottom: -2px; left: 0; width: 40px; height: 2px;
    background: var(--accent);
  }
  .field { margin-bottom: 16px; }
  .field-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) {
    .field-row { grid-template-columns: 1fr; }
  }
  .field-label {
    display: block; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 6px;
    font-weight: 500; letter-spacing: 0.05em;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px; border: 1px solid var(--line);
    background: var(--bg); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; color: var(--ink); border-radius: 3px;
    transition: border-color 0.2s;
  }
  textarea {
    resize: vertical; min-height: 80px; line-height: 1.5;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .modal-actions {
    display: flex; gap: 8px;
    justify-content: flex-end; margin-top: 24px;
    padding-top: 16px; border-top: 1px solid var(--line);
  }
  .btn-modal {
    padding: 10px 20px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; cursor: pointer;
    border-radius: 3px; transition: all 0.2s;
  }
  .btn-modal:hover { border-color: var(--ink); color: var(--ink); }
  .btn-modal.primary {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn-modal.primary:hover { background: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-row">
      <h1>受注リスト</h1>
      <div class="header-meta">
        <div id="sync-status">● 接続中...</div>
        <button id="btn-reload" title="サーバーから最新データを読み込み">↻ 更新</button>
        <div class="subtitle" id="today"></div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <button class="btn-add-main" id="btn-add">新規受注を追加</button>

  <div class="controls">
    <button class="filter-btn active" data-filter="active">進行中</button>
    <button class="filter-btn" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="見積中">見積中</button>
    <button class="filter-btn" data-filter="受注">受注</button>
    <button class="filter-btn" data-filter="着工">着工</button>
    <button class="filter-btn" data-filter="完工">完工</button>
    <button class="filter-btn" data-filter="請求済">請求済</button>
    <button class="filter-btn" data-filter="入金済">入金済</button>
  </div>

  <div class="list" id="list"></div>

  <div class="backup-bar">
    <button class="backup-btn" id="btn-export">バックアップを保存</button>
    <button class="backup-btn" id="btn-import">バックアップを読込</button>
    <input type="file" id="file-import" accept=".json" style="display:none" />
  </div>
</div>

<!-- 追加/編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">新規受注を追加</div>
    <div class="field-row">
      <div class="field">
        <label class="field-label">受注日</label>
        <input type="date" id="edit-orderDate" />
      </div>
      <div class="field">
        <label class="field-label">ステータス</label>
        <select id="edit-status">
          <option value="見積中">見積中</option>
          <option value="受注">受注</option>
          <option value="着工">着工</option>
          <option value="完工">完工</option>
          <option value="請求済">請求済</option>
          <option value="入金済">入金済</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">お客様名 / 現場名 <span style="color:var(--danger)">*</span></label>
      <input type="text" id="edit-client" placeholder="例: ○○邸、△△ビル新築工事" />
    </div>
    <div class="field">
      <label class="field-label">現場住所</label>
      <input type="text" id="edit-address" placeholder="例: 岐阜市○○町1-2-3" />
    </div>
    <div class="field">
      <label class="field-label">工事内容</label>
      <input type="text" id="edit-work" placeholder="例: 分電盤交換、コンセント増設" />
    </div>
    <div class="field">
      <label class="field-label">元請け会社(下請けの場合)</label>
      <input type="text" id="edit-contractor" placeholder="直請けの場合は空欄" />
    </div>
    <div class="field-row">
      <div class="field">
        <label class="field-label">着工予定日</label>
        <input type="date" id="edit-startDate" />
      </div>
      <div class="field">
        <label class="field-label">完工予定日</label>
        <input type="date" id="edit-endDate" />
      </div>
    </div>
    <div class="field">
      <label class="field-label">メモ</label>
      <textarea id="edit-note" placeholder="連絡先、注意事項、進捗メモなど"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal" id="btn-cancel">キャンセル</button>
      <button class="btn-modal primary" id="btn-save">保存する</button>
    </div>
  </div>
</div>

<!-- ステータス変更モーダル -->
<div class="modal-overlay" id="status-modal">
  <div class="modal" style="max-width: 380px;">
    <div class="modal-title">ステータスを変更</div>
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <button class="btn-modal status-quick" data-status="見積中" style="text-align: left;">⚪ 見積中</button>
      <button class="btn-modal status-quick" data-status="受注" style="text-align: left;">🔵 受注</button>
      <button class="btn-modal status-quick" data-status="着工" style="text-align: left;">🟠 着工</button>
      <button class="btn-modal status-quick" data-status="完工" style="text-align: left;">🟢 完工</button>
      <button class="btn-modal status-quick" data-status="請求済" style="text-align: left;">🟣 請求済</button>
      <button class="btn-modal status-quick" data-status="入金済" style="text-align: left;">⚫ 入金済</button>
    </div>
    <div class="modal-actions">
      <button class="btn-modal" id="btn-status-cancel">キャンセル</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx515bd-Uf5-tlVLy2zPkfgmc__D7TKYhwa7SMu7C31N4aNnQTU66tfpwFXR-itwXwm/exec';
  const STORAGE_KEY = 'orders_v1';
  const STATUS_ORDER = ['見積中', '受注', '着工', '完工', '請求済', '入金済'];

  let orders = [];
  let currentFilter = 'active';
  let editingId = null;
  let statusTargetId = null;
  let saveTimer = null;
  let isLoading = false;

  const today = new Date();
  const todayStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('today').textContent = `TODAY ${todayStr}`;

  function setStatus(text, color) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    el.textContent = text;
    el.style.color = color || 'var(--ink-fade)';
  }

  async function loadOrders() {
    isLoading = true;
    setStatus('● 読み込み中...', 'var(--warn)');
    try {
      const res = await fetch(GAS_URL + '?action=get');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      orders = data.orders || [];
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); } catch(e) {}
      setStatus('● 同期済み', 'var(--safe)');
    } catch (e) {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        orders = data ? JSON.parse(data) : [];
        setStatus('● オフライン(ローカル表示)', 'var(--danger)');
      } catch (err) {
        orders = [];
        setStatus('● 読み込み失敗', 'var(--danger)');
      }
    }
    isLoading = false;
    render();
  }

  function saveOrders() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); } catch(e) {}
    setStatus('● 保存待機中...', 'var(--warn)');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      setStatus('● 保存中...', 'var(--warn)');
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'save', orders: orders })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        setStatus('● 同期済み', 'var(--safe)');
      } catch (e) {
        setStatus('● 保存失敗(ローカルには保存済)', 'var(--danger)');
      }
    }, 1500);
  }

  async function reloadFromServer() {
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'save', orders: orders })
        });
      } catch(e) {}
    }
    await loadOrders();
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const target = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0,0,0,0);
    return Math.floor((target - now) / (1000 * 60 * 60 * 24));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}/${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function dateClass(dateStr, status) {
    // 入金済はもう急ぎ表示しない
    if (status === '入金済' || status === '完工' || status === '請求済') return '';
    const days = daysUntil(dateStr);
    if (days === null) return '';
    if (days < 0) return 'urgent';
    if (days <= 7) return 'soon';
    return '';
  }

  // ソート: 進行中→完了の順、その中で完工予定日が近い順
  function sortOrders(list) {
    return [...list].sort((a, b) => {
      const sa = STATUS_ORDER.indexOf(a.status);
      const sb = STATUS_ORDER.indexOf(b.status);
      // 入金済は最後
      if (a.status === '入金済' && b.status !== '入金済') return 1;
      if (b.status === '入金済' && a.status !== '入金済') return -1;
      // 完工予定日が近い順
      const da = daysUntil(a.endDate);
      const db = daysUntil(b.endDate);
      if (da === null && db === null) return sa - sb;
      if (da === null) return 1;
      if (db === null) return -1;
      return da - db;
    });
  }

  function filterOrders(list) {
    if (currentFilter === 'all') return list;
    if (currentFilter === 'active') return list.filter(o => o.status !== '入金済');
    return list.filter(o => o.status === currentFilter);
  }

  function render() {
    const listEl = document.getElementById('list');
    const filtered = filterOrders(sortOrders(orders));

    // 統計
    const stats = {};
    STATUS_ORDER.forEach(s => stats[s] = 0);
    orders.forEach(o => { if (stats[o.status] !== undefined) stats[o.status]++; });
    const active = orders.filter(o => o.status !== '入金済').length;
    document.getElementById('stats').innerHTML = `
      <div class="stat-item">進行中 <span class="stat-num">${active}</span> 件</div>
      <div class="stat-item">見積中 <span class="stat-num">${stats['見積中']}</span></div>
      <div class="stat-item">受注 <span class="stat-num">${stats['受注']}</span></div>
      <div class="stat-item">着工 <span class="stat-num">${stats['着工']}</span></div>
      <div class="stat-item">完工 <span class="stat-num">${stats['完工']}</span></div>
      <div class="stat-item">請求済 <span class="stat-num">${stats['請求済']}</span></div>
    `;

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">∅</div><div>表示する案件がありません</div></div>`;
      return;
    }

    listEl.innerHTML = filtered.map(o => {
      const cls = `s-${o.status}`;
      const startCls = dateClass(o.startDate, o.status);
      const endCls = dateClass(o.endDate, o.status);
      const hasNote = o.note && o.note.trim().length > 0;
      const hasContractor = o.contractor && o.contractor.trim().length > 0;
      return `
        <div class="item ${cls}" data-id="${o.id}">
          <div class="item-header">
            <div class="item-main">
              <div class="item-client">${escapeHtml(o.client || '(名称未設定)')}</div>
              ${o.work ? `<div class="item-work">${escapeHtml(o.work)}</div>` : ''}
            </div>
            <div class="status-tag ${cls}">${o.status}</div>
          </div>
          <div class="item-details">
            ${o.orderDate ? `<div class="detail-row"><span class="detail-label">受注日</span><span class="detail-value date">${formatDate(o.orderDate)}</span></div>` : ''}
            ${o.startDate ? `<div class="detail-row"><span class="detail-label">着工予定</span><span class="detail-value date ${startCls}">${formatDate(o.startDate)}</span></div>` : ''}
            ${o.endDate ? `<div class="detail-row"><span class="detail-label">完工予定</span><span class="detail-value date ${endCls}">${formatDate(o.endDate)}</span></div>` : ''}
            ${o.address ? `<div class="detail-row"><span class="detail-label">住所</span><span class="detail-value">${escapeHtml(o.address)}</span></div>` : ''}
            ${hasContractor ? `<div class="detail-row"><span class="detail-label">元請け</span><span class="detail-value">${escapeHtml(o.contractor)}</span></div>` : ''}
          </div>
          ${hasNote ? `<div class="item-note">${escapeHtml(o.note)}</div>` : ''}
          <div class="item-footer">
            <div class="item-id">#${String(o.id).slice(-6)}</div>
            <div class="item-actions">
              <button class="btn-icon btn-status" data-action="status" data-id="${o.id}">ステータス変更</button>
              <button class="btn-icon btn-edit" data-action="edit" data-id="${o.id}">編集</button>
              <button class="btn-icon btn-delete" data-action="delete" data-id="${o.id}">削除</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 追加ボタン
  document.getElementById('btn-add').addEventListener('click', () => {
    editingId = null;
    document.getElementById('modal-title').textContent = '新規受注を追加';
    document.getElementById('edit-orderDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('edit-status').value = '見積中';
    document.getElementById('edit-client').value = '';
    document.getElementById('edit-address').value = '';
    document.getElementById('edit-work').value = '';
    document.getElementById('edit-contractor').value = '';
    document.getElementById('edit-startDate').value = '';
    document.getElementById('edit-endDate').value = '';
    document.getElementById('edit-note').value = '';
    document.getElementById('edit-modal').classList.add('show');
    setTimeout(() => document.getElementById('edit-client').focus(), 100);
  });

  function openEditModal(id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    editingId = id;
    document.getElementById('modal-title').textContent = '受注を編集';
    document.getElementById('edit-orderDate').value = o.orderDate || '';
    document.getElementById('edit-status').value = o.status || '見積中';
    document.getElementById('edit-client').value = o.client || '';
    document.getElementById('edit-address').value = o.address || '';
    document.getElementById('edit-work').value = o.work || '';
    document.getElementById('edit-contractor').value = o.contractor || '';
    document.getElementById('edit-startDate').value = o.startDate || '';
    document.getElementById('edit-endDate').value = o.endDate || '';
    document.getElementById('edit-note').value = o.note || '';
    document.getElementById('edit-modal').classList.add('show');
    setTimeout(() => document.getElementById('edit-client').focus(), 100);
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('show');
    editingId = null;
  }

  // 保存
  document.getElementById('btn-save').addEventListener('click', () => {
    const client = document.getElementById('edit-client').value.trim();
    if (!client) {
      alert('お客様名/現場名は必須です');
      document.getElementById('edit-client').focus();
      return;
    }
    const data = {
      orderDate: document.getElementById('edit-orderDate').value || null,
      status: document.getElementById('edit-status').value,
      client: client,
      address: document.getElementById('edit-address').value.trim(),
      work: document.getElementById('edit-work').value.trim(),
      contractor: document.getElementById('edit-contractor').value.trim(),
      startDate: document.getElementById('edit-startDate').value || null,
      endDate: document.getElementById('edit-endDate').value || null,
      note: document.getElementById('edit-note').value.trim()
    };

    if (editingId) {
      const o = orders.find(x => x.id === editingId);
      if (o) Object.assign(o, data);
    } else {
      orders.push({ id: Date.now(), ...data });
    }
    saveOrders();
    closeEditModal();
    render();
  });

  document.getElementById('btn-cancel').addEventListener('click', closeEditModal);

  document.getElementById('edit-modal').addEventListener('click', (e) => {
    if (e.target.id === 'edit-modal') closeEditModal();
  });

  // リスト操作
  document.getElementById('list').addEventListener('click', (e) => {
    const action = e.target.dataset.action;
    const id = Number(e.target.dataset.id);
    if (!action || !id) return;
    if (action === 'edit') {
      openEditModal(id);
    } else if (action === 'delete') {
      const o = orders.find(x => x.id === id);
      if (confirm(`「${o ? o.client : ''}」を削除しますか?`)) {
        orders = orders.filter(x => x.id !== id);
        saveOrders(); render();
      }
    } else if (action === 'status') {
      statusTargetId = id;
      document.getElementById('status-modal').classList.add('show');
    }
  });

  // ステータス変更モーダル
  document.querySelectorAll('.status-quick').forEach(btn => {
    btn.addEventListener('click', () => {
      const newStatus = btn.dataset.status;
      const o = orders.find(x => x.id === statusTargetId);
      if (o) {
        o.status = newStatus;
        saveOrders(); render();
      }
      document.getElementById('status-modal').classList.remove('show');
      statusTargetId = null;
    });
  });

  document.getElementById('btn-status-cancel').addEventListener('click', () => {
    document.getElementById('status-modal').classList.remove('show');
    statusTargetId = null;
  });

  document.getElementById('status-modal').addEventListener('click', (e) => {
    if (e.target.id === 'status-modal') {
      document.getElementById('status-modal').classList.remove('show');
      statusTargetId = null;
    }
  });

  // フィルター
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // バックアップ
  document.getElementById('btn-export').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(orders, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `受注リスト_${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('file-import').click();
  });

  document.getElementById('file-import').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          if (confirm(`${data.length}件のデータを読み込みます。現在のデータは上書きされます。よろしいですか?`)) {
            orders = data;
            saveOrders();
            render();
          }
        }
      } catch (err) {
        alert('ファイルの読み込みに失敗しました');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // 再読み込み
  document.getElementById('btn-reload').addEventListener('click', reloadFromServer);

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !isLoading && !saveTimer) {
      reloadFromServer();
    }
  });

  // ESCで閉じる
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('edit-modal').classList.remove('show');
      document.getElementById('status-modal').classList.remove('show');
    }
  });

  loadOrders();
</script>
</body>
</html>
