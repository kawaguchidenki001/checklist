<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未段取現場リスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --paper: #fefdf9;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-fade: #888;
    --accent: #8a4a1a;
    --line: #d9d4c6;
    --warn: #d97706;
    --danger: #b8302d;
    --safe: #4a7c59;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 20px 80px;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(138, 74, 26, 0.04), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(74, 124, 89, 0.03), transparent 40%);
  }
  .container { max-width: 980px; margin: 0 auto; }
  header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  header::after {
    content: "";
    position: absolute;
    bottom: -6px; left: 0;
    width: 60px; height: 2px;
    background: var(--accent);
  }
  .title-row {
    display: flex; align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .header-meta {
    display: flex; align-items: center; gap: 12px;
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--ink-fade);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  #sync-status {
    font-size: 11px; color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
  }
  #btn-reload {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); padding: 4px 10px;
    font-size: 11px; cursor: pointer; border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #btn-reload:hover { border-color: var(--ink); color: var(--ink); }
  .stats {
    display: flex; gap: 24px; margin-top: 16px;
    font-size: 13px; color: var(--ink-soft); flex-wrap: wrap;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; color: var(--ink); font-size: 15px;
  }
  .btn-add-main {
    padding: 14px 24px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    border-radius: 3px; transition: background 0.2s;
    margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
  }
  .btn-add-main:hover { background: var(--accent); }
  .btn-add-main::before {
    content: "+"; display: inline-block;
    width: 20px; height: 20px;
    background: var(--paper); color: var(--ink);
    text-align: center; line-height: 20px;
    border-radius: 50%; font-weight: 700;
  }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item {
    background: var(--paper); border: 1px solid var(--line);
    border-left: 4px solid var(--line); border-radius: 3px;
    padding: 16px 18px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .item.urgent { border-left-color: var(--danger); }
  .item.soon { border-left-color: var(--warn); }
  .item.normal { border-left-color: var(--safe); }
  .item.no-deadline { border-left-color: var(--ink-fade); }
  .item.overdue {
    border-left-color: var(--danger);
    background: linear-gradient(to right, rgba(184, 48, 45, 0.05), var(--paper) 40%);
  }
  .item-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 8px;
  }
  .item-main {
    flex: 1; min-width: 0;
  }
  .item-site {
    font-size: 17px; font-weight: 700; color: var(--ink);
    word-break: break-word;
    font-family: 'Noto Serif JP', serif;
  }
  .item-work {
    font-size: 14px; color: var(--ink-soft);
    margin-top: 2px; word-break: break-word;
  }
  .deadline-badge {
    text-align: right;
    min-width: 100px;
    white-space: nowrap;
  }
  .deadline-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }
  .deadline-days {
    font-size: 11px;
    margin-top: 2px;
    font-weight: 700;
  }
  .days-overdue, .days-urgent { color: var(--danger); }
  .days-soon { color: var(--warn); }
  .days-normal { color: var(--safe); }
  .days-none { color: var(--ink-fade); font-weight: 400; }
  .item-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 4px 16px;
    margin-top: 8px;
    font-size: 12px;
  }
  .detail-row {
    display: flex; gap: 6px; align-items: baseline;
  }
  .detail-label {
    color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    min-width: 48px;
  }
  .detail-value {
    color: var(--ink-soft); word-break: break-word;
  }
  .item-note {
    font-size: 13px; color: var(--ink-soft);
    margin-top: 10px; padding: 8px 12px;
    background: var(--bg); border-left: 2px solid var(--line);
    border-radius: 2px; white-space: pre-wrap;
    word-break: break-word; line-height: 1.5;
  }
  .item-footer {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 10px;
    padding-top: 8px; border-top: 1px dashed var(--line);
  }
  .item-id {
    font-size: 10px; color: var(--ink-fade);
    font-family: 'JetBrains Mono', monospace;
  }
  .item-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); cursor: pointer;
    padding: 4px 10px; font-size: 12px;
    border-radius: 2px; transition: all 0.2s; line-height: 1;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .btn-edit:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--ink-fade); font-family: 'Noto Serif JP', serif;
    font-style: italic;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26, 26, 26, 0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper); border-radius: 6px;
    padding: 28px; max-width: 520px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    animation: slideUp 0.2s;
  }
  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 24px; padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .modal-title::after {
    content: ""; position: absolute;
    bottom: -2px; left: 0; width: 40px; height: 2px;
    background: var(--accent);
  }
  .field { margin-bottom: 16px; }
  .field-label {
    display: block; font-size: 12px;
    color: var(--ink-soft); margin-bottom: 6px;
    font-weight: 500; letter-spacing: 0.05em;
  }
  input, textarea {
    width: 100%;
    padding: 10px 12px; border: 1px solid var(--line);
    background: var(--bg); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; color: var(--ink); border-radius: 3px;
    transition: border-color 0.2s;
  }
  textarea {
    resize: vertical; min-height: 80px; line-height: 1.5;
  }
  input:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .modal-actions {
    display: flex; gap: 8px;
    justify-content: flex-end; margin-top: 24px;
    padding-top: 16px; border-top: 1px solid var(--line);
  }
  .btn-modal {
    padding: 10px 20px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink-soft);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; cursor: pointer;
    border-radius: 3px; transition: all 0.2s;
  }
  .btn-modal:hover { border-color: var(--ink); color: var(--ink); }
  .btn-modal.primary {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn-modal.primary:hover { background: var(--accent); border-color: var(--accent); }
</style>
<link rel="manifest" href="/checklist/manifest.json">
<meta name="theme-color" content="#5e35b1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お仕事">
<link rel="apple-touch-icon" href="/checklist/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/checklist/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/checklist/icons/icon-512.png">
<script src="/checklist/register-sw.js" defer></script>
</head>
<body>
<div class="container">
  <header>
    <div class="title-row">
      <h1>未段取現場リスト</h1>
      <div class="header-meta">
        <div id="sync-status">● 接続中...</div>
        <button id="btn-reload" title="サーバーから最新データを読み込み">↻ 更新</button>
        <div class="subtitle" id="today"></div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <button class="btn-add-main" id="btn-add">新規現場を追加</button>

  <div class="list" id="list"></div>
</div>

<!-- 追加/編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">新規現場を追加</div>
    <div class="field">
      <label class="field-label">現場名 <span style="color:var(--danger)">*</span></label>
      <input type="text" id="edit-site" placeholder="例: ○○邸、△△ビル" />
    </div>
    <div class="field">
      <label class="field-label">場所(住所)</label>
      <input type="text" id="edit-address" placeholder="例: 岐阜市○○町1-2-3" />
    </div>
    <div class="field">
      <label class="field-label">元請</label>
      <input type="text" id="edit-contractor" placeholder="例: ○○工務店" />
    </div>
    <div class="field">
      <label class="field-label">作業内容</label>
      <input type="text" id="edit-work" placeholder="例: 配線、コンセント増設" />
    </div>
    <div class="field">
      <label class="field-label">完工日(期限)</label>
      <input type="date" id="edit-deadline" />
    </div>
    <div class="field">
      <label class="field-label">メモ</label>
      <textarea id="edit-note" placeholder="必要な材料、連絡事項、注意点など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal" id="btn-cancel">キャンセル</button>
      <button class="btn-modal primary" id="btn-save">保存する</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbydHiX7reP3kfZwK14XJ_fcnRoze0WlcooeByt6iUtbPFhAU9uwaruVpkcABp1cc7SD5g/exec';
  const STORAGE_KEY = 'pending_sites_v1';

  let sites = [];
  let editingId = null;
  let saveTimer = null;
  let isLoading = false;

  const today = new Date();
  const todayStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('today').textContent = `TODAY ${todayStr}`;

  function setStatus(text, color) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    el.textContent = text;
    el.style.color = color || 'var(--ink-fade)';
  }

  async function loadSites() {
    isLoading = true;
    setStatus('● 読み込み中...', 'var(--warn)');
    try {
      const res = await fetch(GAS_URL + '?action=get');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      sites = data.sites || [];
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); } catch(e) {}
      setStatus('● 同期済み', 'var(--safe)');
    } catch (e) {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        sites = data ? JSON.parse(data) : [];
        setStatus('● オフライン(ローカル表示)', 'var(--danger)');
      } catch (err) {
        sites = [];
        setStatus('● 読み込み失敗', 'var(--danger)');
      }
    }
    isLoading = false;
    render();
  }

  function saveSites() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sites)); } catch(e) {}
    setStatus('● 保存待機中...', 'var(--warn)');
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      setStatus('● 保存中...', 'var(--warn)');
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'save', sites: sites })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        setStatus('● 同期済み', 'var(--safe)');
      } catch (e) {
        setStatus('● 保存失敗(ローカルには保存済)', 'var(--danger)');
      }
    }, 1500);
  }

  async function reloadFromServer() {
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'save', sites: sites })
        });
      } catch(e) {}
    }
    await loadSites();
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const target = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0,0,0,0);
    return Math.floor((target - now) / (1000 * 60 * 60 * 24));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}/${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}`;
  }

  function deadlineLabel(days) {
    if (days === null) return { text: '期限なし', cls: 'days-none' };
    if (days < 0) return { text: `${Math.abs(days)}日超過`, cls: 'days-overdue' };
    if (days === 0) return { text: '本日まで', cls: 'days-urgent' };
    if (days === 1) return { text: '明日まで', cls: 'days-urgent' };
    if (days <= 3) return { text: `あと${days}日`, cls: 'days-urgent' };
    if (days <= 7) return { text: `あと${days}日`, cls: 'days-soon' };
    return { text: `あと${days}日`, cls: 'days-normal' };
  }

  function borderClass(days) {
    if (days === null) return 'no-deadline';
    if (days < 0) return 'overdue';
    if (days <= 3) return 'urgent';
    if (days <= 7) return 'soon';
    return 'normal';
  }

  // 期限が近い順、期限なしは最後
  function sortSites(list) {
    return [...list].sort((a, b) => {
      const da = daysUntil(a.deadline);
      const db = daysUntil(b.deadline);
      if (da === null && db === null) return 0;
      if (da === null) return 1;
      if (db === null) return -1;
      return da - db;
    });
  }

  function render() {
    const listEl = document.getElementById('list');
    const sorted = sortSites(sites);

    // 統計
    const overdue = sites.filter(s => s.deadline && daysUntil(s.deadline) < 0).length;
    const urgent = sites.filter(s => {
      const d = daysUntil(s.deadline);
      return d !== null && d >= 0 && d <= 3;
    }).length;
    const soon = sites.filter(s => {
      const d = daysUntil(s.deadline);
      return d !== null && d > 3 && d <= 7;
    }).length;
    document.getElementById('stats').innerHTML = `
      <div class="stat-item">合計 <span class="stat-num">${sites.length}</span> 件</div>
      <div class="stat-item" style="color: var(--danger)">期限超過 <span class="stat-num" style="color: var(--danger)">${overdue}</span></div>
      <div class="stat-item" style="color: var(--danger)">3日以内 <span class="stat-num" style="color: var(--danger)">${urgent}</span></div>
      <div class="stat-item" style="color: var(--warn)">1週間以内 <span class="stat-num" style="color: var(--warn)">${soon}</span></div>
    `;

    if (sorted.length === 0) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">∅</div><div>未段取の現場はありません</div></div>`;
      return;
    }

    listEl.innerHTML = sorted.map(s => {
      const days = daysUntil(s.deadline);
      const label = deadlineLabel(days);
      const cls = borderClass(days);
      const hasNote = s.note && s.note.trim().length > 0;
      return `
        <div class="item ${cls}" data-id="${s.id}">
          <div class="item-header">
            <div class="item-main">
              <div class="item-site">${escapeHtml(s.site || '(現場名未入力)')}</div>
              ${s.work ? `<div class="item-work">${escapeHtml(s.work)}</div>` : ''}
            </div>
            <div class="deadline-badge">
              <div class="deadline-date">${formatDate(s.deadline)}</div>
              <div class="deadline-days ${label.cls}">${label.text}</div>
            </div>
          </div>
          <div class="item-details">
            ${s.address ? `<div class="detail-row"><span class="detail-label">場所</span><span class="detail-value">${escapeHtml(s.address)}</span></div>` : ''}
            ${s.contractor ? `<div class="detail-row"><span class="detail-label">元請</span><span class="detail-value">${escapeHtml(s.contractor)}</span></div>` : ''}
          </div>
          ${hasNote ? `<div class="item-note">${escapeHtml(s.note)}</div>` : ''}
          <div class="item-footer">
            <div class="item-id">#${String(s.id).slice(-6)}</div>
            <div class="item-actions">
              <button class="btn-icon btn-edit" data-action="edit" data-id="${s.id}">編集</button>
              <button class="btn-icon btn-delete" data-action="delete" data-id="${s.id}">段取済み(削除)</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 追加ボタン
  document.getElementById('btn-add').addEventListener('click', () => {
    editingId = null;
    document.getElementById('modal-title').textContent = '新規現場を追加';
    document.getElementById('edit-site').value = '';
    document.getElementById('edit-address').value = '';
    document.getElementById('edit-contractor').value = '';
    document.getElementById('edit-work').value = '';
    document.getElementById('edit-deadline').value = '';
    document.getElementById('edit-note').value = '';
    document.getElementById('edit-modal').classList.add('show');
    setTimeout(() => document.getElementById('edit-site').focus(), 100);
  });

  function openEditModal(id) {
    const s = sites.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('modal-title').textContent = '現場を編集';
    document.getElementById('edit-site').value = s.site || '';
    document.getElementById('edit-address').value = s.address || '';
    document.getElementById('edit-contractor').value = s.contractor || '';
    document.getElementById('edit-work').value = s.work || '';
    document.getElementById('edit-deadline').value = s.deadline || '';
    document.getElementById('edit-note').value = s.note || '';
    document.getElementById('edit-modal').classList.add('show');
    setTimeout(() => document.getElementById('edit-site').focus(), 100);
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('show');
    editingId = null;
  }

  document.getElementById('btn-save').addEventListener('click', () => {
    const site = document.getElementById('edit-site').value.trim();
    if (!site) {
      alert('現場名は必須です');
      document.getElementById('edit-site').focus();
      return;
    }
    const data = {
      site: site,
      address: document.getElementById('edit-address').value.trim(),
      contractor: document.getElementById('edit-contractor').value.trim(),
      work: document.getElementById('edit-work').value.trim(),
      deadline: document.getElementById('edit-deadline').value || null,
      note: document.getElementById('edit-note').value.trim()
    };

    if (editingId) {
      const s = sites.find(x => x.id === editingId);
      if (s) Object.assign(s, data);
    } else {
      sites.push({ id: Date.now(), ...data });
    }
    saveSites();
    closeEditModal();
    render();
  });

  document.getElementById('btn-cancel').addEventListener('click', closeEditModal);

  document.getElementById('edit-modal').addEventListener('click', (e) => {
    if (e.target.id === 'edit-modal') closeEditModal();
  });

  // リスト操作
  document.getElementById('list').addEventListener('click', (e) => {
    const action = e.target.dataset.action;
    const id = Number(e.target.dataset.id);
    if (!action || !id) return;
    if (action === 'edit') {
      openEditModal(id);
    } else if (action === 'delete') {
      const s = sites.find(x => x.id === id);
      if (confirm(`「${s ? s.site : ''}」を段取済みとしてリストから削除しますか?`)) {
        sites = sites.filter(x => x.id !== id);
        saveSites(); render();
      }
    }
  });

  // 再読み込み
  document.getElementById('btn-reload').addEventListener('click', reloadFromServer);

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !isLoading && !saveTimer) {
      reloadFromServer();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('edit-modal').classList.remove('show');
    }
  });

  loadSites();
</script>
</body>
</html>
